<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Mesa: Una Entrevista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }

        /* Contenedor principal del tablero */
        .board-container {
            position: relative;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            padding: 40px;
            overflow: visible;
            min-height: 850px; /* Suficiente espacio para que quepa todo */
            border: 1px solid #e2e8f0;
        }

        .node {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 12px;
            cursor: default;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #3b82f6;
            background: white;
            position: absolute;
            z-index: 10;
            line-height: 1.2;
            color: #1e293b;
        }

        .node.active {
            transform: scale(1.15);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
            border-color: #ef4444;
            background: #fef2f2;
        }

        .node.special {
            background-color: #1e293b;
            color: white;
            border-color: #475569;
        }

        .node.finish {
            background-color: #10b981;
            color: white;
            border-color: #059669;
            font-size: 0.9rem;
        }

        .path-line {
            position: absolute;
            background: #e2e8f0;
            height: 6px;
            z-index: 1;
            transform-origin: left center;
            border-radius: 3px;
        }

        .player-token {
            width: 48px;
            height: 48px;
            background: #ef4444;
            border-radius: 50%;
            position: absolute;
            z-index: 25;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 4px solid white;
            box-shadow: 0 8px 15px rgba(239, 68, 68, 0.4);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dice-container {
            perspective: 1000px;
            width: 100px;
            height: 100px;
        }

        #dice {
            width: 60px;
            height: 60px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.3, 1.1);
            cursor: pointer;
        }

        .dice-side {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #3b82f6;
            border: 2px solid #2563eb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            font-weight: bold;
        }

        .side-1 { transform: rotateY(0deg) translateZ(30px); }
        .side-2 { transform: rotateY(90deg) translateZ(30px); }
        .side-3 { transform: rotateY(180deg) translateZ(30px); }
        .side-4 { transform: rotateY(-90deg) translateZ(30px); }
        .side-5 { transform: rotateX(90deg) translateZ(30px); }
        .side-6 { transform: rotateX(-90deg) translateZ(30px); }

        @media (max-width: 1024px) {
            .board-wrapper {
                transform: scale(0.85);
                transform-origin: top left;
                width: 100%;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body class="flex flex-col items-center p-6 min-h-screen">

    <div class="max-w-6xl w-full">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-800 mb-2">Una Entrevista</h1>
            <p class="text-slate-500 font-medium">Práctica de español para adultos</p>
        </header>

        <div class="flex flex-col lg:flex-row justify-center gap-12 items-start">
            
            <!-- Tablero -->
            <div class="board-wrapper flex-shrink-0">
                <div id="board" class="board-container w-[850px]">
                    <div id="token" class="player-token">
                        <span class="text-white text-[11px] font-black">TÚ</span>
                    </div>
                </div>
            </div>

            <!-- Controles Lateral -->
            <div class="flex flex-col items-center gap-8 bg-white p-10 rounded-3xl shadow-xl border border-slate-100 lg:sticky lg:top-10 w-full lg:w-72">
                <div class="dice-container flex items-center justify-center">
                    <div id="dice" onclick="rollDice()">
                        <div class="dice-side side-1">1</div>
                        <div class="dice-side side-2">2</div>
                        <div class="dice-side side-3">3</div>
                        <div class="dice-side side-4">4</div>
                        <div class="dice-side side-5">5</div>
                        <div class="dice-side side-6">6</div>
                    </div>
                </div>
                
                <div class="w-full space-y-4">
                    <button id="rollBtn" onclick="rollDice()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all transform active:scale-95 shadow-lg shadow-blue-200">
                        Lanzar Dado
                    </button>
                    
                    <div class="bg-slate-50 p-4 rounded-xl text-center border border-slate-100">
                        <p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1">Resultado</p>
                        <p id="result" class="text-4xl font-black text-blue-600">-</p>
                    </div>
                </div>

                <button onclick="resetGame()" class="text-sm font-bold text-slate-400 hover:text-red-500 transition-colors uppercase tracking-tighter">Reiniciar partida</button>
            </div>
        </div>
    </div>

    <!-- Modal de Tarea -->
    <div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl transform transition-all text-center">
            <div id="modal-icon" class="text-5xl mb-6">💬</div>
            <h2 class="text-blue-600 font-black text-sm uppercase tracking-widest mb-2">Instrucción</h2>
            <div id="modal-content" class="text-2xl font-bold text-slate-800 mb-10 leading-snug">
                ¿Cómo estás?
            </div>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl hover:bg-blue-600 transition-all shadow-xl">
                ¡Entendido!
            </button>
        </div>
    </div>

    <script>
        // Coordenadas ajustadas para asegurar que META sea visible y el camino sea equilibrado
        const nodesData = [
            { text: "INICIO", x: 60, y: 40 },
            { text: "¿Cómo estás?", x: 180, y: 30 },
            { text: "Saludar 14:30", x: 300, y: 80 },
            { text: "¿?", x: 420, y: 30, special: true },
            { text: "El plural: un amigo", x: 540, y: 90 },
            { text: "Leer en voz alta: 0-10", x: 670, y: 140 },
            { text: "Conjugar: SER", x: 610, y: 280 },
            { text: "¿De dónde eres?", x: 480, y: 210 },
            { text: "Conjugar: ESCUCHAR", x: 380, y: 340 },
            { text: "¿Dónde vives?", x: 230, y: 310 },
            { text: "¿Cómo te llamas?", x: 130, y: 190 },
            { text: "Conjugar: TENER", x: 40, y: 300 },
            { text: "¿?", x: 60, y: 440, special: true },
            { text: "Leer en voz alta: 11-20", x: 190, y: 470 },
            { text: "¿Estás casado/a?", x: 340, y: 420 },
            { text: "Conjugar: HACER", x: 480, y: 500 },
            { text: "Leer en voz alta: 21-30", x: 630, y: 440 },
            { text: "¿?", x: 680, y: 570, special: true },
            { text: "El plural: nuestra casa", x: 550, y: 680 },
            { text: "¿?", x: 430, y: 650, special: true },
            { text: "Saludar 22:15", x: 540, y: 550 },
            { text: "¿Qué tal hablas español?", x: 380, y: 560 },
            { text: "El plural: su amigo", x: 270, y: 660 },
            { text: "¿?", x: 200, y: 560, special: true },
            { text: "El plural: el país", x: 70, y: 670 },
            { text: "¿Qué haces en tu tiempo libre?", x: 60, y: 540 },
            { text: "Saludar 07:00", x: 170, y: 690 },
            { text: "META", x: 320, y: 760, finish: true } // Casilla final ahora bien posicionada
        ];

        let currentPosition = 0;
        let isRolling = false;
        const board = document.getElementById('board');
        const token = document.getElementById('token');
        const dice = document.getElementById('dice');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content');
        const resultDisplay = document.getElementById('result');
        const rollBtn = document.getElementById('rollBtn');

        function initBoard() {
            nodesData.forEach((node, index) => {
                const el = document.createElement('div');
                el.className = `node ${node.special ? 'special' : ''} ${node.finish ? 'finish' : ''}`;
                el.style.left = node.x + 'px';
                el.style.top = node.y + 'px';
                el.innerText = node.text;
                el.id = `node-${index}`;
                board.appendChild(el);

                if (index > 0) {
                    const prev = nodesData[index - 1];
                    drawLine(prev.x + 42, prev.y + 42, node.x + 42, node.y + 42);
                }
            });
            updateTokenPosition();
        }

        function drawLine(x1, y1, x2, y2) {
            const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            const line = document.createElement('div');
            line.className = 'path-line';
            line.style.width = length + 'px';
            line.style.left = x1 + 'px';
            line.style.top = y1 + 'px';
            line.style.transform = `rotate(${angle}deg)`;
            board.appendChild(line);
        }

        function updateTokenPosition() {
            const node = nodesData[currentPosition];
            token.style.left = (node.x + 18) + 'px';
            token.style.top = (node.y + 18) + 'px';
            
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
            document.getElementById(`node-${currentPosition}`).classList.add('active');
        }

        function rollDice() {
            if (isRolling || modal.style.display === 'flex') return;
            
            isRolling = true;
            rollBtn.disabled = true;

            const roll = Math.floor(Math.random() * 6) + 1;
            const rotations = [
                [0, 0, 0], [0, 90, 0], [0, 180, 0], 
                [0, -90, 0], [-90, 0, 0], [90, 0, 0]
            ];

            const [x, y, z] = rotations[roll - 1];
            dice.style.transform = `rotateX(${x + 1440}deg) rotateY(${y + 1440}deg) rotateZ(${z}deg)`;
            
            setTimeout(() => {
                resultDisplay.innerText = roll;
                movePlayer(roll);
            }, 1000);
        }

        function movePlayer(steps) {
            let i = 0;
            const interval = setInterval(() => {
                if (i < steps && currentPosition < nodesData.length - 1) {
                    currentPosition++;
                    updateTokenPosition();
                    i++;
                } else {
                    clearInterval(interval);
                    isRolling = false;
                    rollBtn.disabled = false;
                    setTimeout(showTask, 600);
                }
            }, 300);
        }

        function showTask() {
            const node = nodesData[currentPosition];
            const task = node.text;
            const iconEl = document.getElementById('modal-icon');

            if (node.finish) {
                iconEl.innerText = "🏆";
                modalContent.innerHTML = "¡FELICIDADES!<br>Has terminado la entrevista.";
                modal.style.display = 'flex';
                return;
            }
            if (task === "INICIO") return;

            let content = task;
            if (node.special) {
                iconEl.innerText = "❓";
                content = "Hazle una pregunta en español a la persona de tu derecha.";
            } else if (task.includes("Conjugar")) {
                iconEl.innerText = "✍️";
                content = `Conjuga el verbo:<br><span class='text-blue-600 font-black'>${task.split(':')[1]}</span>`;
            } else if (task.includes("Saludar")) {
                iconEl.innerText = "👋";
                content = `Dime el saludo adecuado para las:<br><span class='text-blue-600 font-black'>${task.split(' ')[1]}</span>`;
            } else if (task.includes("El plural")) {
                iconEl.innerText = "👥";
                content = `Pasa esta expresión a plural:<br><span class='text-blue-600 font-black'>${task.split(':')[1]}</span>`;
            } else if (task.includes("Leer")) {
                iconEl.innerText = "🔢";
                content = `Lee los números en voz alta:<br><span class='text-blue-600 font-black'>${task.split(':')[1]}</span>`;
            } else {
                iconEl.innerText = "💬";
            }

            modalContent.innerHTML = content;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function resetGame() {
            currentPosition = 0;
            updateTokenPosition();
            resultDisplay.innerText = "-";
            dice.style.transform = `rotateX(0deg) rotateY(0deg)`;
        }

        window.onload = initBoard;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Mesa: Una Entrevista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0f4f8;
        }

        .board-container {
            position: relative;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 20px;
            overflow: hidden;
        }

        .node {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid #3b82f6;
            background: white;
            position: absolute;
            z-index: 10;
        }

        .node.active {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            border-color: #ef4444;
            background: #eff6ff;
        }

        .node.special {
            background-color: #1e293b;
            color: white;
            border-color: #1e293b;
        }

        .path-line {
            position: absolute;
            background: #cbd5e1;
            height: 6px;
            z-index: 1;
            transform-origin: left center;
        }

        .player-token {
            width: 40px;
            height: 40px;
            background: #ef4444;
            border-radius: 50%;
            position: absolute;
            z-index: 20;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .dice-container {
            perspective: 1000px;
            width: 100px;
            height: 100px;
        }

        #dice {
            width: 60px;
            height: 60px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s ease-out;
            cursor: pointer;
        }

        .dice-side {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #3b82f6;
            border: 2px solid white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* Positions for dice sides */
        .side-1 { transform: rotateY(0deg) translateZ(30px); }
        .side-2 { transform: rotateY(90deg) translateZ(30px); }
        .side-3 { transform: rotateY(180deg) translateZ(30px); }
        .side-4 { transform: rotateY(-90deg) translateZ(30px); }
        .side-5 { transform: rotateX(90deg) translateZ(30px); }
        .side-6 { transform: rotateX(-90deg) translateZ(30px); }

        @media (max-width: 640px) {
            .board-container { height: auto !important; transform: scale(0.65); transform-origin: top left; }
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <h1 class="text-3xl font-bold text-gray-800 mb-2">Una Entrevista</h1>
    <p class="text-gray-600 mb-6 text-center max-w-md">
        Lanza el dado y avanza. Responde a la pregunta o realiza la tarea de la casilla en la que caigas.
    </p>

    <div class="flex flex-wrap justify-center gap-8 mb-8 w-full max-w-5xl">
        <!-- Tablero -->
        <div id="board" class="board-container w-full h-[650px] md:w-[800px]">
            <div id="token" class="player-token"></div>
        </div>

        <!-- Controles -->
        <div class="flex flex-col items-center gap-6 bg-white p-6 rounded-2xl shadow-lg h-fit">
            <div class="dice-container flex items-center justify-center">
                <div id="dice" onclick="rollDice()">
                    <div class="dice-side side-1">1</div>
                    <div class="dice-side side-2">2</div>
                    <div class="dice-side side-3">3</div>
                    <div class="dice-side side-4">4</div>
                    <div class="dice-side side-5">5</div>
                    <div class="dice-side side-6">6</div>
                </div>
            </div>
            <button onclick="rollDice()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition transform active:scale-95 shadow-md">
                Lanzar Dado
            </button>
            <div class="text-center">
                <p class="text-sm text-gray-500">Último resultado:</p>
                <p id="result" class="text-2xl font-bold text-blue-600">-</p>
            </div>
            <button onclick="resetGame()" class="text-sm text-gray-400 hover:text-red-500 underline">Reiniciar juego</button>
        </div>
    </div>

    <!-- Modal de Tarea -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl transform transition-all text-center">
            <h2 id="modal-title" class="text-blue-600 font-bold text-xl mb-4">¡Casilla Alcanzada!</h2>
            <div id="modal-content" class="text-2xl font-medium text-gray-800 mb-8">
                ¿Cómo estás?
            </div>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">
                ¡Hecho!
            </button>
        </div>
    </div>

    <script>
        const nodesData = [
            { text: "¡INICIO!", x: 50, y: 50 },
            { text: "¿Cómo estás?", x: 150, y: 30 },
            { text: "Saludar 14:30", x: 250, y: 80 },
            { text: "¿?", x: 380, y: 50, special: true },
            { text: "El plural: un amigo", x: 480, y: 100 },
            { text: "Leer en voz alta: 0-10", x: 600, y: 150 },
            { text: "Conjugar: SER", x: 550, y: 280 },
            { text: "¿De dónde eres?", x: 420, y: 220 },
            { text: "Conjugar: ESCUCHAR", x: 350, y: 330 },
            { text: "¿Dónde vives?", x: 200, y: 310 },
            { text: "¿Cómo te llamas?", x: 120, y: 180 },
            { text: "Conjugar: TENER", x: 40, y: 280 },
            { text: "¿?", x: 60, y: 400, special: true },
            { text: "Leer en voz alta: 11-20", x: 180, y: 450 },
            { text: "¿Estás casado/a?", x: 320, y: 410 },
            { text: "Conjugar: HACER", x: 450, y: 480 },
            { text: "Leer en voz alta: 21-30", x: 600, y: 430 },
            { text: "¿?", x: 650, y: 550, special: true },
            { text: "El plural: nuestra casa", x: 550, y: 650 },
            { text: "¿?", x: 450, y: 620, special: true },
            { text: "Saludar 22:15", x: 550, y: 540 },
            { text: "¿Qué tal hablas español?", x: 380, y: 570 },
            { text: "El plural: su amigo", x: 280, y: 630 },
            { text: "¿?", x: 200, y: 550, special: true },
            { text: "El plural: el país", x: 80, y: 650 },
            { text: "¿Qué haces en tu tiempo libre?", x: 60, y: 550 },
            { text: "Saludar 07:00", x: 150, y: 650 },
            { text: "¡META!", x: 300, y: 680 }
        ];

        let currentPosition = 0;
        const board = document.getElementById('board');
        const token = document.getElementById('token');
        const dice = document.getElementById('dice');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content');
        const resultDisplay = document.getElementById('result');

        // Inicializar Tablero
        function initBoard() {
            nodesData.forEach((node, index) => {
                const el = document.createElement('div');
                el.className = `node ${node.special ? 'special' : ''}`;
                el.style.left = node.x + 'px';
                el.style.top = node.y + 'px';
                el.innerText = node.text;
                el.id = `node-${index}`;
                board.appendChild(el);

                // Dibujar líneas de camino
                if (index > 0) {
                    const prev = nodesData[index - 1];
                    drawLine(prev.x + 40, prev.y + 40, node.x + 40, node.y + 40);
                }
            });
            updateTokenPosition();
        }

        function drawLine(x1, y1, x2, y2) {
            const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            const line = document.createElement('div');
            line.className = 'path-line';
            line.style.width = length + 'px';
            line.style.left = x1 + 'px';
            line.style.top = y1 + 'px';
            line.style.transform = `rotate(${angle}deg)`;
            board.appendChild(line);
        }

        function updateTokenPosition() {
            const node = nodesData[currentPosition];
            token.style.left = (node.x + 20) + 'px';
            token.style.top = (node.y + 20) + 'px';
            
            // Highlight active node
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
            document.getElementById(`node-${currentPosition}`).classList.add('active');
        }

        function rollDice() {
            if (modal.style.display === 'flex') return;

            const roll = Math.floor(Math.random() * 6) + 1;
            const rotations = [
                [0, 0, 0],       // 1
                [0, 90, 0],      // 2
                [0, 180, 0],     // 3
                [0, -90, 0],     // 4
                [-90, 0, 0],     // 5
                [90, 0, 0]       // 6
            ];

            const [x, y, z] = rotations[roll - 1];
            // Añadimos vueltas extra para efecto visual
            dice.style.transform = `rotateX(${x + 720}deg) rotateY(${y + 720}deg) rotateZ(${z}deg)`;
            
            setTimeout(() => {
                resultDisplay.innerText = roll;
                movePlayer(roll);
            }, 1000);
        }

        function movePlayer(steps) {
            let i = 0;
            const interval = setInterval(() => {
                if (i < steps && currentPosition < nodesData.length - 1) {
                    currentPosition++;
                    updateTokenPosition();
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(showTask, 500);
                }
            }, 300);
        }

        function showTask() {
            const task = nodesData[currentPosition].text;
            if (task === "¡META!" || task === "¡INICIO!") {
                if (task === "¡META!") {
                    modalContent.innerHTML = "🎉 ¡Felicidades! Has completado la entrevista.";
                    modal.style.display = 'flex';
                }
                return;
            }

            let content = task;
            if (task === "¿?") {
                content = "🤔 Inventa una pregunta para tu compañero (o respóndela tú mismo si juegas solo).";
            } else if (task.includes("Conjugar")) {
                content = `📝 ${task}<br><small class='text-sm text-blue-400'>(Dilo en todas las personas: yo, tú, él...)</small>`;
            } else if (task.includes("Saludar")) {
                content = `👋 ${task}<br><small class='text-sm text-blue-400'>(Ej: ¡Buenas tardes!)</small>`;
            } else if (task.includes("Leer")) {
                content = `📖 ${task}`;
            }

            modalContent.innerHTML = content;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function resetGame() {
            currentPosition = 0;
            updateTokenPosition();
            resultDisplay.innerText = "-";
            dice.style.transform = `rotateX(0deg) rotateY(0deg)`;
        }

        window.onload = initBoard;
    </script>
</body>
</html>
